<div class="flex flex-col items-center justify-center rounded-2xl border border-dashed border-slate-300 dark:border-slate-700 bg-white/50 dark:bg-slate-900/50 py-16 px-6 text-center">
  <div class="mb-4 inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-50 text-brand-600 dark:bg-brand-500/10 dark:text-brand-300">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
  </div>
  <h3 class="text-base font-semibold">{{ title or "Nothing here yet" }}</h3>
  <p class="mt-1 max-w-md text-sm text-slate-500 dark:text-slate-400">{{ body or "Your data will appear here as you use ConvertX." }}</p>
  {% if cta_href %}
    <a href="{{ cta_href }}" class="mt-5 inline-flex items-center gap-2 rounded-lg bg-brand-600 px-3.5 py-2 text-sm font-semibold text-white hover:bg-brand-700 transition">
      {{ cta_label or "Get started" }}
    </a>
  {% endif %}
</div>
